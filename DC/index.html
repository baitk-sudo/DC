<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字化信贷系统 — 组件设计与产品流程</title>
  <!-- Theme CSS: keep CDN, allow duplicates for resilience -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://unpkg.com/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    (function () {
      // Docsify cannot reliably run from file:// due to XHR restrictions.
      if (window.location.protocol === 'file:') {
        document.getElementById('app').innerHTML = [
          '<h3>无法加载：请通过本地 HTTP 服务打开</h3>',
          '<p>你现在是 <code>file://</code> 方式打开，Docsify 无法读取 Markdown。</p>',
          '<p>在 <code>DC</code> 目录执行以下任一命令，然后用浏览器访问：<code>http://127.0.0.1:3000/index.html?view=report#/</code></p>',
          '<pre><code>python -m http.server 3000</code></pre>',
          '<pre><code>py -m http.server 3000</code></pre>',
          '<p>如果公司网络拦截 CDN，请换个网络或在控制台看脚本加载错误。</p>'
        ].join('');
        return;
      }

      const params = new URLSearchParams(window.location.search || '');
      const viewRaw = (params.get('view') || '').toLowerCase();
      const view = viewRaw === 'impl' ? 'impl' : 'report';

      var pathname = window.location.pathname || '';
      var basePath = (pathname.lastIndexOf('/') > 0) ? pathname.substring(0, pathname.lastIndexOf('/') + 1) : '';

      var alias = {
        '组件设计-组件调用关系总览': '5.详细设计-单组件设计/组件设计-组件调用关系总览',
        '组件设计-按组件索引': '5.详细设计-单组件设计/组件设计-按组件索引',
        '组件设计-单组件样板-进件管理组件': '5.详细设计-单组件设计/组件设计-单组件样板-进件管理组件',
        '组件设计-单组件样板-客户授权准入组件': '5.详细设计-单组件设计/组件设计-单组件样板-客户授权准入组件',
        '组件设计-第1段-营销获客与预授信': '3.高阶设计-阶段设计/组件设计-第1段-营销获客与预授信',
        '组件设计-第2段-客户注册与认证': '3.高阶设计-阶段设计/组件设计-第2段-客户注册与认证',
        '组件设计-第3段-授权准入与规则触发': '3.高阶设计-阶段设计/组件设计-第3段-授权准入与规则触发',
        '组件设计-第3_5段-授信申请_贷款申请与提额': '3.高阶设计-阶段设计/组件设计-第3_5段-授信申请_贷款申请与提额',
        '组件设计-第4段-进件接收与风控准入': '3.高阶设计-阶段设计/组件设计-第4段-进件接收与风控准入',
        '组件设计-第5段-三合一任务与审批': '3.高阶设计-阶段设计/组件设计-第5段-三合一任务与审批',
        '组件设计-第6段-签约与合同管理': '3.高阶设计-阶段设计/组件设计-第6段-签约与合同管理',
        '组件设计-第7段-放款与受托支付审批': '3.高阶设计-阶段设计/组件设计-第7段-放款与受托支付审批',
        '组件设计-第8段-还款': '3.高阶设计-阶段设计/组件设计-第8段-还款',
        '组件设计-第9段-贷后管理与预警': '3.高阶设计-阶段设计/组件设计-第9段-贷后管理与预警',
        '组件设计-第10段-监管报送与报表': '3.高阶设计-阶段设计/组件设计-第10段-监管报送与报表',
        '组件设计-第11段-批处理与流程衔接': '3.高阶设计-阶段设计/组件设计-第11段-批处理与流程衔接',
        '横切设计/总览-核心概念与状态事件': '2.高阶设计-横切设计/总览-核心概念与状态事件',
        '产品流程/产品流程-组件被调用关系梳理': '4.高阶设计-产品流程/产品流程-组件被调用关系梳理',
        '产品流程/产品流程-业务步骤级组件分析': '4.高阶设计-产品流程/产品流程-业务步骤级组件分析'
      };

      window.$docsify = {
        name: '数字化信贷系统',
        basePath: basePath,
        alias: alias,
        loadSidebar: view === 'report' ? 'sidebar-report.md' : 'sidebar-impl.md',
        loadNavbar: 'navbar.md',
        subMaxLevel: 3,
        homepage: view === 'report' ? 'overview.md' : 'README.md',
        search: 'auto',
        searchPlaceholder: '搜索文档…',
        formatUpdated: '{YYYY}-{MM}-{DD} {HH}:{mm}',
        noEmoji: false,
        relativePath: true,
        maxLevel: 4,
        executeScript: true,
        auto2top: true
      };
    })();
  </script>
  <script>
    (function () {
      function loadScriptWithFallback(urls, done) {
        let idx = 0;
        function tryNext() {
          if (idx >= urls.length) {
            const app = document.getElementById('app');
            app.innerHTML = [
              '<h3>Docsify 脚本加载失败</h3>',
              '<p>可能原因：CDN 被拦截、网络不可用、或证书问题。</p>',
              '<p>请在浏览器开发者工具 Console/Network 查看失败请求，再尝试更换网络或放行 CDN 域名。</p>',
              '<p>已尝试的地址：</p>',
              '<pre><code>' + urls.join('\\n') + '</code></pre>'
            ].join('');
            return;
          }
          const s = document.createElement('script');
          s.src = urls[idx++];
          s.async = false;
          s.onload = function () { done && done(); };
          s.onerror = function () { tryNext(); };
          document.body.appendChild(s);
        }
        tryNext();
      }

      // Load docsify core then search plugin, each with CDN fallbacks
      loadScriptWithFallback(
        [
          'https://cdn.jsdelivr.net/npm/docsify@4',
          'https://unpkg.com/docsify@4'
        ],
        function () {
          loadScriptWithFallback(
            [
              'https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js',
              'https://unpkg.com/docsify@4/lib/plugins/search.min.js'
            ]
          );
        }
      );
    })();
  </script>
</body>
</html>
